<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admin Passkey</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container">
        <h1>Register Signing Passkey</h1>
        <p>Register a browser/device passkey. This passkey is required for every signing request.</p>

        <form id="passkeyForm">
            <button type="submit">Register Device Passkey</button>
        </form>

        <p id="status" role="status"></p>
        <p><a href="/index.html">Back to PKI Manager</a></p>
    </main>

    <script>
        function base64UrlToBuffer(base64url) {
            const padding = '='.repeat((4 - (base64url.length % 4)) % 4);
            const base64 = (base64url + padding).replace(/-/g, '+').replace(/_/g, '/');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function bufferToBase64Url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function normalizeCreationOptions(options) {
            options.publicKey.challenge = base64UrlToBuffer(options.publicKey.challenge);
            options.publicKey.user.id = base64UrlToBuffer(options.publicKey.user.id);
            if (Array.isArray(options.publicKey.excludeCredentials)) {
                options.publicKey.excludeCredentials = options.publicKey.excludeCredentials.map((cred) => ({
                    ...cred,
                    id: base64UrlToBuffer(cred.id)
                }));
            }
            return options;
        }

        function serializeRegistrationCredential(credential) {
            return {
                id: credential.id,
                rawId: bufferToBase64Url(credential.rawId),
                type: credential.type,
                response: {
                    attestationObject: bufferToBase64Url(credential.response.attestationObject),
                    clientDataJSON: bufferToBase64Url(credential.response.clientDataJSON),
                    transports: credential.response.getTransports ? credential.response.getTransports() : []
                },
                authenticatorAttachment: credential.authenticatorAttachment || '',
                clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {}
            };
        }

        document.getElementById('passkeyForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const status = document.getElementById('status');
            status.textContent = 'Starting WebAuthn registration...';

            try {
                const beginResponse = await fetch('/api/passkey/register/begin', {
                    method: 'POST'
                });

                if (!beginResponse.ok) {
                    throw new Error(await beginResponse.text());
                }

                const creationOptions = normalizeCreationOptions(await beginResponse.json());
                const credential = await navigator.credentials.create(creationOptions);
                if (!credential) {
                    throw new Error('No passkey credential created.');
                }

                const finishResponse = await fetch('/api/passkey/register/finish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(serializeRegistrationCredential(credential))
                });

                if (!finishResponse.ok) {
                    throw new Error(await finishResponse.text());
                }

                status.textContent = 'Passkey registered successfully.';
            } catch (error) {
                status.textContent = `Failed: ${error.message || 'unknown error'}`;
            }
        });
    </script>
</body>
</html>
