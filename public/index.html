<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightweight CA Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://unpkg.com/asn1js@3.0.5/build/index.js"></script>
    <script src="https://unpkg.com/pkijs@3.4.0/build/index.js"></script>
</head>

<body>
    <nav class="navbar" style="display: flex; justify-content: center; align-items: center; gap: 1rem;">

            <a href="/index.html">Home</a>
            <a href="/csr.html">Generate CSR</a>
            <a href="/ca_management.html">Manage CAs</a>
            <a href="/register_passkey.html">Register Passkey</a>
            <a href="/login.html">Login</a>

    </nav>
    <main class="container">
        <hgroup>
            <h1>PKI Manager</h1>
            <h2>Sign CSRs and Manage X.509 Certificates</h2>
        </hgroup>
        <p><a href="/register_passkey.html">Register or rotate admin passkey</a></p>

        <section>
            <h3>Upload CSR</h3>
            <form id="csrForm">
                <label for="csrInput">Paste your PEM-encoded CSR here:</label>
                <textarea id="csrInput" rows="6" placeholder="-----BEGIN CERTIFICATE REQUEST-----..."
                    required></textarea>
                <button type="submit">Sign Certificate</button>
            </form>
            <div id="resultBox" style="display: none; margin-top: 1rem;">
                <label><strong>Issued Certificate:</strong></label>
                <textarea id="certOutput" rows="8" readonly></textarea>
            </div>
        </section>

        <hr>

        <section>
            <h3>Issued Certificates</h3>
            <figure>
                <table role="grid">
                    <thead>
                        <tr>
                            <th>Serial Number</th>
                            <th>Subject (CN)</th>
                            <th>Status</th>
                            <th>Expiry</th>
                        </tr>
                    </thead>
                    <tbody id="certTableBody">
                    </tbody>
                </table>
            </figure>
        </section>
    </main>

    <h2>Generate CSR in Browser</h2>
    <button onclick="generateCSR()">Generate Keypair & CSR</button>

    <h3>CSR (Send this to the server):</h3>
    <textarea id="csrOutput" rows="10" cols="70" readonly></textarea>

    <h3>Private Key (STAY ON CLIENT):</h3>
    <textarea id="keyOutput" rows="10" cols="70" readonly></textarea>

    <script>
        async function generateCSR() {
            const commonName = "example.com";

            // 1. Generate RSA Keypair using Web Crypto API
            const algorithm = {
                name: "RSASSA-PKCS1-v1_5",
                modulusLength: 2048,
                publicExponent: new Uint8Array([0x01, 0x00, 0x01]),
                hash: "SHA-256",
            };

            const keyPair = await window.crypto.subtle.generateKey(algorithm, true, ["sign", "verify"]);

            // 2. Initialize PKI.js CSR object
            const pkijs = window.pkijs;
            const pkcs10 = new pkijs.CertificationRequest();

            // Set Subject Name
            pkcs10.subject.typesAndValues.push(new pkijs.AttributeTypeAndValue({
                type: "2.5.4.3", // Common Name (CN)
                value: new asn1js.Utf8String({ value: commonName })
            }));

            // Attach Public Key to CSR
            await pkcs10.subjectPublicKeyInfo.importKey(keyPair.publicKey);

            // 3. Sign the CSR with the Private Key
            await pkcs10.sign(keyPair.privateKey, "SHA-256");

            // 4. Convert to PEM format
            const csrBuffer = pkcs10.toSchema().toBER(false);
            document.getElementById('csrOutput').value = formatPem(csrBuffer, "CERTIFICATE REQUEST");

            // 5. Export Private Key (PKCS#8) for local storage
            const privateKeyBuffer = await window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
            document.getElementById('keyOutput').value = formatPem(privateKeyBuffer, "PRIVATE KEY");
        }

        function formatPem(buffer, label) {
            const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));
            const lines = base64.match(/.{1,64}/g).join('\n');
            return `-----BEGIN ${label}-----\n${lines}\n-----END ${label}-----`;
        }
    </script>

    <script>
        function base64UrlToBuffer(base64url) {
            const padding = '='.repeat((4 - (base64url.length % 4)) % 4);
            const base64 = (base64url + padding).replace(/-/g, '+').replace(/_/g, '/');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function bufferToBase64Url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function normalizeAssertionOptions(options) {
            options.publicKey.challenge = base64UrlToBuffer(options.publicKey.challenge);
            if (Array.isArray(options.publicKey.allowCredentials)) {
                options.publicKey.allowCredentials = options.publicKey.allowCredentials.map((cred) => ({
                    ...cred,
                    id: base64UrlToBuffer(cred.id)
                }));
            }
            return options;
        }

        function serializeAssertion(assertion) {
            return {
                id: assertion.id,
                rawId: bufferToBase64Url(assertion.rawId),
                type: assertion.type,
                response: {
                    authenticatorData: bufferToBase64Url(assertion.response.authenticatorData),
                    clientDataJSON: bufferToBase64Url(assertion.response.clientDataJSON),
                    signature: bufferToBase64Url(assertion.response.signature),
                    userHandle: assertion.response.userHandle ? bufferToBase64Url(assertion.response.userHandle) : ''
                },
                authenticatorAttachment: assertion.authenticatorAttachment || '',
                clientExtensionResults: assertion.getClientExtensionResults ? assertion.getClientExtensionResults() : {}
            };
        }

        async function verifyPasskeyForSigning() {
            const beginResponse = await fetch('/api/passkey/assertion/begin', { method: 'POST' });
            if (!beginResponse.ok) {
                throw new Error(await beginResponse.text());
            }

            const requestOptions = normalizeAssertionOptions(await beginResponse.json());
            const assertion = await navigator.credentials.get(requestOptions);
            if (!assertion) {
                throw new Error('No passkey assertion returned by browser.');
            }

            const finishResponse = await fetch('/api/passkey/assertion/finish', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(serializeAssertion(assertion))
            });
            if (!finishResponse.ok) {
                throw new Error(await finishResponse.text());
            }
        }

        // Handle CSR Submission
        document.getElementById('csrForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const csrText = document.getElementById('csrInput').value;

            try {
                await verifyPasskeyForSigning();
            } catch (err) {
                alert('Passkey verification failed: ' + err.message);
                return;
            }

            const response = await fetch('/api/sign', {
                method: 'POST',
                body: csrText
            });

            if (response.ok) {
                const certPem = await response.text();
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('certOutput').value = certPem;
                document.getElementById('csrInput').value = ''; // Clear input
                loadCerts(); // Refresh table
            } else {
                alert("Error signing CSR: " + await response.text());
            }
        });

        // Load Certificates into Table
        async function loadCerts() {
            const response = await fetch('/api/certs');
            const certs = await response.json();
            const tbody = document.getElementById('certTableBody');
            tbody.innerHTML = '';

            if (!certs) return;

            certs.forEach(cert => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><small><code>${cert.serial.substring(0, 16)}...</code></small></td>
                    <td>${cert.subject}</td>
                    <td><kbd style="background-color: var(--primary);">${cert.status}</kbd></td>
                    <td>${cert.expiry}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Load on startup
        loadCerts();
    </script>
</body>

</html>
