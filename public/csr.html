<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Client-Side PKCS12 Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            height: 100px;
            font-family: monospace;
            margin-top: 5px;
        }

        section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .key-area {
            background: #fff5f5;
        }
    </style>
</head>

<body>

    <h1>PKCS12 Client-Side Workflow</h1>

    <section>
        <h2>Step 1: Generate CSR</h2>
        <p>This creates the private key locally. <b>The key never leaves your browser.</b></p>
        <button id="genBtn">Generate Keypair & CSR</button>
        <br><br>
        <label>CSR (Send to Go Server):</label>
        <textarea id="csrOut"></textarea>

        <div class="key-area">
            <label>Private Key (Saved in Memory):</label>
            <textarea id="keyOut" readonly placeholder="Private key will appear here..."></textarea>
        </div>
    </section>

    <section>
        <h2>Step 2: Create PKCS12 (.p12)</h2>
        <p>Paste the <b>Signed Certificate</b> you received from your Go server here:</p>
        <textarea id="certIn" placeholder="-----BEGIN CERTIFICATE-----..."></textarea>

        <p>Set a Password for the P12 file:</p>
        <input type="password" id="p12Pass" value="password123">
        <br><br>
        <button id="bundleBtn">Download .p12 File</button>
    </section>

    <script type="module">
        import * as asn1js from 'https://jspm.dev/asn1js';
        import * as pkijs from 'https://jspm.dev/pkijs';

        // Variables to hold the keys in memory
        let currentPrivateKeyPem = "";

        // --- GENERATION LOGIC ---
        document.getElementById('genBtn').onclick = async () => {
            const algorithm = {
                name: "RSASSA-PKCS1-v1_5",
                modulusLength: 2048,
                publicExponent: new Uint8Array([1, 0, 1]),
                hash: "SHA-256",
            };

            const SANs = new pkijs.GeneralNames({
                names: [
                    new pkijs.GeneralName({
                        type: 2, // DNS
                        value: "mosii.xyz"
                    }),
                    new pkijs.GeneralName({
                        type: 2, // DNS
                        value: "*.mosii.xyz"
                    }),
                ]
            });

            const keyPair = await window.crypto.subtle.generateKey(algorithm, true, ["sign", "verify"]);

            // Build CSR
            const pkcs10 = new pkijs.CertificationRequest();
            pkcs10.version = 0;
            pkcs10.attributes = [new pkijs.Attribute({
                type: "1.2.840.113549.1.9.14", // Extension Request
                values: [
                    new pkijs.Extensions({
                        extensions: [
                            new pkijs.Extension({
                                extnID: "2.5.29.17", // subjectAltName
                                critical: false,
                                extnValue: SANs.toSchema().toBER(false)
                            })
                        ]
                    }).toSchema()
                ]
            })];
            pkcs10.subject.typesAndValues.push(new pkijs.AttributeTypeAndValue({
                type: "2.5.4.3",
                value: new asn1js.Utf8String({ value: "MyLocalIdentity" })
            }));




            await pkcs10.subjectPublicKeyInfo.importKey(keyPair.publicKey);
            await pkcs10.sign(keyPair.privateKey, "SHA-256");

            // Export to UI
            const csrBuffer = pkcs10.toSchema().toBER(false);
            const privateKeyBuffer = await window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey);

            document.getElementById('csrOut').value = formatPem(csrBuffer, "CERTIFICATE REQUEST");
            currentPrivateKeyPem = formatPem(privateKeyBuffer, "PRIVATE KEY");
            document.getElementById('keyOut').value = currentPrivateKeyPem;
        };

        // --- PKCS12 BUNDLING LOGIC ---
        document.getElementById('bundleBtn').onclick = () => {
            const certPem = document.getElementById('certIn').value;
            const password = document.getElementById('p12Pass').value;

            if (!certPem || !currentPrivateKeyPem) {
                alert("Please generate a key and paste a signed certificate first!");
                return;
            }

            try {
                // 1. Convert PEMs to Forge objects
                const privateKey = forge.pki.privateKeyFromPem(currentPrivateKeyPem);
                const cert = forge.pki.certificateFromPem(certPem);

                // 2. Create the PKCS12 ASN.1 structure
                // We use createPkcs12 to bundle the key and cert
                const p12Asn1 = forge.pkcs12.toPkcs12Asn1(
                    privateKey, [cert], password,
                    { algorithm: 'aes256', generateLocalKeyId: true }
                );

                // 3. Convert to binary and trigger download
                const p12Der = forge.asn1.toDer(p12Asn1).getBytes();
                const p12Uint8 = new Uint8Array(p12Der.length);
                for (let i = 0; i < p12Der.length; i++) {
                    p12Uint8[i] = p12Der.charCodeAt(i);
                }

                const blob = new Blob([p12Uint8], { type: 'application/x-pkcs12' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'identity.p12';
                link.click();
            } catch (err) {
                console.error(err);
                alert("Error creating PKCS12: " + err.message);
            }
        };

        function formatPem(buffer, label) {
            const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));
            const lines = base64.match(/.{1,64}/g).join('\n');
            return `-----BEGIN ${label}-----\n${lines}\n-----END ${label}-----`;
        }
    </script>
</body>

</html>
